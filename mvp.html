<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HoloMax - 全息 3D 素材联盟 & AI 创作平台</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: #020617;
            color: #f8fafc;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .glass {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .neon-glow {
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5), 0 0 20px rgba(56, 189, 248, 0.3);
        }
        .neon-border {
            border: 1px solid rgba(56, 189, 248, 0.3);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.1);
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .floating { animation: float 4s ease-in-out infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Nav = ({ activeTab, setActiveTab }) => (
            <nav className="fixed top-0 left-0 w-full z-50 glass border-b border-white/5 px-6 py-4 flex justify-between items-center">
                <div className="flex items-center gap-2">
                    <div className="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center neon-border">
                        <i data-lucide="zap" className="w-5 h-5 text-white"></i>
                    </div>
                    <span className="orbitron text-xl font-bold tracking-widest text-blue-400">HOLOMAX</span>
                </div>
                <div className="flex gap-8">
                    {['素材库', 'AI创作', '分销中心'].map(tab => (
                        <button 
                            key={tab}
                            onClick={() => setActiveTab(tab)}
                            className={`text-sm tracking-wider transition-all hover:text-blue-400 ${activeTab === tab ? 'text-blue-400 font-semibold border-b-2 border-blue-400 pb-1' : 'text-slate-400'}`}
                        >
                            {tab}
                        </button>
                    ))}
                </div>
                <div className="flex items-center gap-4">
                    <button className="text-xs text-white/70 hover:text-white px-4 py-2 rounded-full border border-white/10 glass transition-all">设计端登录</button>
                    <button className="text-xs bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-full font-bold shadow-lg shadow-blue-500/20 transition-all">购买机器</button>
                </div>
            </nav>
        );

        const MaterialCard = ({ title, img, price, isFree }) => (
            <div className="group glass rounded-2xl overflow-hidden hover:scale-[1.02] transition-all duration-300 shadow-xl shadow-black/50">
                <div className="aspect-[16/9] bg-black relative flex items-center justify-center overflow-hidden">
                    <img src={img} alt={title} className="w-full h-full object-cover group-hover:scale-110 transition-all duration-700 opacity-80 group-hover:opacity-100" />
                    <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-40 group-hover:opacity-100 transition-opacity"></div>
                    <button className="absolute bottom-4 right-4 bg-blue-600 p-2 rounded-lg opacity-0 group-hover:opacity-100 transition-all transform translate-y-4 group-hover:translate-y-0 shadow-lg">
                        <i data-lucide="download" className="w-4 h-4 text-white"></i>
                    </button>
                    {isFree && <span className="absolute top-4 left-4 text-[10px] bg-emerald-500 px-2 py-0.5 rounded text-white font-bold tracking-wider">FREE</span>}
                </div>
                <div className="p-4 flex justify-between items-center">
                    <div>
                        <h3 className="text-sm font-semibold text-slate-200">{title}</h3>
                        <p className="text-[10px] text-slate-500">已成功部署至 12,300+ 设备</p>
                    </div>
                    <span className="text-blue-400 orbitron text-xs font-bold">{isFree ? '0.00' : `¥${price}`}</span>
                </div>
            </div>
        );

        const MaterialLibrary = () => {
             const materials = [
                { title: "金鳞猛虎 - 粒子全息", img: "https://r.jina.ai/i/e00a39f6-6c70-4cc6-86c3-982823617304", price: 19.9, isFree: false },
                { title: "幻彩琉璃香水", img: "https://r.jina.ai/i/6cebe736-6cbe-4c8d-8a21-992621184711", price: 29.9, isFree: false },
                { title: "极光系列 - X7 运动鞋", img: "https://r.jina.ai/i/06c13278-453c-4232-99b8-b446195a2265", price: 0, isFree: true },
                { title: "黄金分形 3D 球体", img: "https://r.jina.ai/i/97335c01-8719-4554-9569-e32e311c8679", price: 12.9, isFree: false },
                { title: "赛博朋克炫屏边框", img: "https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=600&auto=format&fit=crop", price: 0, isFree: true },
                { title: "3D 倒计时 - 开业专用", img: "https://images.unsplash.com/photo-1543286386-713bcd534a71?q=80&w=600&auto=format&fit=crop", price: 5.9, isFree: false }
            ];

            return (
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 py-8 animate-in fade-in slide-in-from-bottom-4 duration-1000">
                    {materials.map((m, index) => <MaterialCard key={index} {...m} />)}
                </div>
            );
        };

        const AICurator = () => {
            const [prompt, setPrompt] = useState('');
            const [isGenerating, setIsGenerating] = useState(false);
            const [result, setResult] = useState(null);

            const handleGenerate = () => {
                if(!prompt) return;
                setIsGenerating(true);
                setTimeout(() => {
                    setIsGenerating(false);
                    setResult("https://r.jina.ai/i/e00a39f6-6c70-4cc6-86c3-982823617304");
                }, 3000);
            };

            return (
                <div className="max-w-4xl mx-auto py-12 flex flex-col items-center">
                    <div className="text-center mb-12">
                        <h2 className="text-3xl font-bold orbitron mb-4 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-sky-500">AI 全息视觉生成引擎</h2>
                        <p className="text-slate-400 max-w-lg mx-auto leading-relaxed">输入任何想法，HoloMax AI 将为您即刻生成具有完美物理全息深度的黑底素材。</p>
                    </div>

                    <div className="w-full glass p-8 rounded-3xl border border-blue-500/20 relative overflow-hidden group">
                        <div className="absolute inset-0 bg-blue-500/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                        <div className="relative flex flex-col md:flex-row gap-4">
                            <input 
                                value={prompt}
                                onChange={(e) => setPrompt(e.target.value)}
                                placeholder="例如: 一只在太空中飞翔的黄金龙，黑色背景..." 
                                className="flex-1 bg-black/40 border border-white/10 rounded-2xl px-6 py-4 focus:outline-none focus:border-blue-400 transition-all text-white placeholder-slate-600"
                            />
                            <button 
                                onClick={handleGenerate}
                                disabled={isGenerating}
                                className="bg-blue-600 hover:bg-blue-500 px-8 py-4 rounded-2xl font-bold flex items-center justify-center gap-2 transition-all min-w-[160px] disabled:opacity-50 text-white shadow-lg shadow-blue-500/20"
                            >
                                {isGenerating ? (
                                    <div className="w-6 h-6 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                                ) : (
                                    <>
                                        <i data-lucide="sparkles" className="w-5 h-5"></i>
                                        <span>立即生成</span>
                                    </>
                                )}
                            </button>
                        </div>
                    </div>

                    {result && (
                        <div className="mt-12 w-full animate-in zoom-in duration-700">
                             <div className="text-xs text-blue-400 orbitron mb-4 uppercase tracking-widest text-center">AI 已根据 “{prompt}” 生成素材稿</div>
                             <div className="glass p-2 rounded-3xl p-4 bg-black border border-white/5 shadow-[0_0_50px_rgba(56,189,248,0.1)]">
                                <img src={result} className="w-full h-auto rounded-2xl max-h-[400px] object-contain" />
                                <div className="mt-6 flex justify-end gap-4">
                                    <button className="text-xs text-white/50 px-4 py-2 hover:text-white transition-all underline underline-offset-4">删除重做</button>
                                    <button className="bg-white text-black px-6 py-2 rounded-full font-bold text-xs hover:bg-slate-200 transition-all">发布到商城</button>
                                </div>
                             </div>
                        </div>
                    )}
                    
                    <div className="mt-16 grid grid-cols-2 lg:grid-cols-4 gap-6 w-full opacity-50">
                        {['低延迟生成', '物理光追降噪', '自动黑底增强', '全平台适配'].map(feature => (
                             <div key={feature} className="text-center border border-white/5 py-3 rounded-xl text-[10px] orbitron tracking-widest">
                                {feature}
                             </div>
                        ))}
                    </div>
                </div>
            );
        };

        const DistributorPanel = () => (
            <div className="py-12 animate-in fade-in duration-1000">
                <div className="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
                    {[
                        { label: '累计佣金收益', value: '¥12,480.00', icon: 'credit-card', color: 'text-emerald-400' },
                        { label: '关联托管设备', value: '482 台', icon: 'monitor', color: 'text-blue-400' },
                        { label: '本月素材分发', value: '8,421 次', icon: 'arrow-down-to-line', color: 'text-purple-400' }
                    ].map((stat, i) => (
                        <div key={i} className="glass p-8 rounded-3xl hover:border-blue-500/30 transition-all group">
                            <div className="flex justify-between items-start mb-4">
                                <div className={`p-2 rounded-lg bg-black/40 group-hover:scale-110 transition-transform ${stat.color}`}>
                                    <i data-lucide={stat.icon} className="w-6 h-6"></i>
                                </div>
                                <span className="text-[10px] text-slate-500 uppercase tracking-widest font-bold">Realtime</span>
                            </div>
                            <h4 className="text-slate-400 text-sm mb-1">{stat.label}</h4>
                            <p className="text-2xl font-bold orbitron text-white">{stat.value}</p>
                        </div>
                    ))}
                </div>
                
                <div className="glass p-10 rounded-[2rem] flex flex-col md:flex-row items-center gap-12 border-blue-500/10 shadow-2xl shadow-blue-500/5">
                    <div className="flex-1">
                        <div className="inline-block px-3 py-1 bg-blue-500/10 border border-blue-500/20 rounded-full text-[10px] text-blue-400 orbitron font-bold mb-4">PARTNER SYSTEM</div>
                        <h3 className="text-3xl font-bold mb-4 tracking-tight">生成您的分销专属码</h3>
                        <p className="text-slate-400 text-sm leading-relaxed mb-8 max-w-lg">
                            将此二维码贴在您的硬件设备或宣传页上。
                            当客户通过此码扫码下载收费素材时，系统将通过智能合约直接返还 <strong>50%</strong> 的利润至您的余额。
                        </p>
                        <div className="flex gap-4">
                            <div className="flex-1 bg-black/60 border border-white/5 rounded-2xl px-6 py-4 flex items-center justify-between group cursor-pointer hover:border-white/20 transition-all">
                                <span className="text-sm font-mono text-slate-400 truncate">https://holomax.app/join?agt_id=AG-8521</span>
                                <i data-lucide="copy" className="w-4 h-4 text-slate-600 group-hover:text-white transition-all"></i>
                            </div>
                            <button className="bg-white text-black px-8 py-4 rounded-2xl font-bold text-sm hover:bg-slate-200 transition-all shadow-xl">复制地址</button>
                        </div>
                    </div>
                    <div className="w-64 h-64 bg-white p-6 rounded-3xl floating shadow-[0_0_80px_rgba(255,255,255,0.15)] flex items-center justify-center">
                        <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=https://holomax.app/join?id=AG-8521" className="w-full h-full" alt="QR Code" />
                    </div>
                </div>
            </div>
        );

        const App = () => {
            const [activeTab, setActiveTab] = useState('素材库');

            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [activeTab]);

            return (
                <div className="min-h-screen pb-20">
                    <Nav activeTab={activeTab} setActiveTab={setActiveTab} />
                    
                    <main className="pt-32 px-6 max-w-7xl mx-auto">
                        <header className="flex justify-between items-end mb-12 border-l-4 border-blue-500 pl-6">
                            <div>
                                <h1 className="text-5xl font-extrabold mb-3 tracking-tight">
                                    {activeTab === '素材库' && '全域素材库'}
                                    {activeTab === 'AI创作' && 'AI 空间工坊'}
                                    {activeTab === '分销中心' && '增长控制台'}
                                </h1>
                                <p className="text-slate-400 text-lg max-w-2xl font-light">
                                    {activeTab === '素材库' && '深度适配 Dsqi 及行业 99% 的硬件协议。'}
                                    {activeTab === 'AI创作' && '专为 3D 浮空成像优化的 AI 算力集群。'}
                                    {activeTab === '分销中心' && '自动化分佣闭环，让每一台硬件都成为现金池。'}
                                </p>
                            </div>
                            {activeTab === '素材库' && (
                                <div className="hidden lg:flex gap-4">
                                    <div className="glass px-5 py-3 rounded-2xl flex items-center gap-3 text-sm text-slate-300 hover:bg-white/5 cursor-pointer">
                                        <i data-lucide="search" className="w-4 h-4"></i>
                                        搜索素材...
                                    </div>
                                    <div className="glass px-5 py-3 rounded-2xl flex items-center gap-3 text-sm text-slate-300 hover:bg-white/5 cursor-pointer">
                                        <i data-lucide="layout-grid" className="w-4 h-4"></i>
                                        全部分类
                                    </div>
                                </div>
                            )}
                        </header>

                        {activeTab === '素材库' && <MaterialLibrary />}
                        {activeTab === 'AI创作' && <AICurator />}
                        {activeTab === '分销中心' && <DistributorPanel />}
                    </main>

                    {/* Gradient Effects */}
                    <div className="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[1000px] h-[1000px] bg-blue-500/5 blur-[180px] rounded-full -z-10 pointer-events-none opacity-50"></div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        setTimeout(() => { if (window.lucide) window.lucide.createIcons(); }, 100);
    </script>
</body>
</html>
