<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>卫黎 3D 内容平台</title>
  <link href="https://fonts.loli.net/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      color: #e2e8f0;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    /* dark grid overlay */
    .grid-bg {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.035) 39px, rgba(255,255,255,0.035) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.035) 39px, rgba(255,255,255,0.035) 40px);
    }

    /* purple orb */
    .orb {
      position: absolute;
      width: 520px; height: 520px;
      border-radius: 50%;
      background: radial-gradient(circle at 50% 50%, rgba(139,92,246,0.35) 0%, rgba(109,40,217,0.15) 40%, transparent 70%);
      filter: blur(40px);
      animation: orb-pulse 6s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes orb-pulse {
      0%, 100% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.12); opacity: 1; }
    }

    .orbitron { font-family: 'Orbitron', sans-serif; }

    /* nav pill */
    .nav-pill {
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.5);
      border-radius: 9999px;
      padding: 8px 22px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      font-family: 'Inter', sans-serif;
    }
    .nav-pill:hover { border-color: rgba(255,255,255,0.3); color: rgba(255,255,255,0.85); }
    .nav-pill.active { background: #fff; color: #0a0a0f; border-color: #fff; }

    /* category pill */
    .cat-pill {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.45);
      border-radius: 9999px;
      padding: 6px 18px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      font-family: 'Inter', sans-serif;
    }
    .cat-pill:hover { border-color: rgba(255,255,255,0.25); color: rgba(255,255,255,0.75); }
    .cat-pill.active { background: rgba(255,255,255,0.12); color: #fff; border-color: rgba(255,255,255,0.35); }

    /* param pill (size selector inside AI tab) */
    .param-pill {
      cursor: pointer;
      border-radius: 9999px;
      padding: 6px 18px;
      font-size: 12px;
      font-weight: 700;
      transition: all 0.2s;
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.45);
      background: transparent;
      font-family: 'Inter', sans-serif;
    }
    .param-pill.selected { background: #7c3aed; color: white; border-color: #8b5cf6; }
    .param-pill:hover { border-color: rgba(255,255,255,0.25); color: rgba(255,255,255,0.75); }

    /* glass card */
    .glass {
      background: rgba(255,255,255,0.025);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.07);
    }

    /* primary button (purple) */
    .btn-primary {
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      color: #fff;
      border: 1px solid rgba(139,92,246,0.5);
      border-radius: 9999px;
      padding: 12px 36px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s;
      font-family: 'Inter', sans-serif;
    }
    .btn-primary:hover { background: linear-gradient(135deg, #8b5cf6, #7c3aed); box-shadow: 0 0 32px rgba(139,92,246,0.45); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

    /* secondary button */
    .btn-secondary {
      background: transparent;
      color: rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 9999px;
      padding: 10px 28px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .btn-secondary:hover { border-color: rgba(255,255,255,0.35); color: #fff; }

    /* inputs */
    input, textarea, select {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 10px;
      color: #e2e8f0;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      padding: 11px 14px;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus, select:focus { border-color: rgba(139,92,246,0.5); }
    input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.25); }
    select option { background: #1a1a2e; }

    /* scrollbar hide */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* progress bar */
    .progress-bar { height: 3px; background: rgba(255,255,255,0.06); border-radius: 9999px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #7c3aed, #a78bfa); border-radius: 9999px; transition: width 0.4s; }

    /* asset card */
    .asset-card { position: relative; border-radius: 16px; overflow: hidden; cursor: pointer; transition: transform 0.2s; }
    .asset-card:hover { transform: translateY(-3px); }
    .asset-card:hover .card-overlay { opacity: 1; }
    .card-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 50%); opacity: 0; transition: opacity 0.2s; display: flex; align-items: flex-end; padding: 12px; }

    /* modal backdrop */
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 50; display: flex; align-items: center; justify-content: center; }

    /* stat card */
    .stat-card { border-radius: 16px; padding: 20px 24px; }

    /* form section label */
    .section-label { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.35); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 12px; }
  </style>
</head>
<body>
<div id="root"></div>
<script>
const { createElement: h, useState, useEffect, useRef, useCallback } = React;

// ─── data ─────────────────────────────────────────────────────────────────────
const CATEGORIES = ['全部','LOGO','奶茶咖啡','酒水饮料','动物','植物','节日','人物','科幻','汽车'];

const FREE_ASSETS = [
  { id:1, title:'赛博龙 LOGO', category:'LOGO', tags:['3D','全息'], thumb:'https://picsum.photos/seed/logo1/400/400', free:true },
  { id:2, title:'珍珠奶茶旋转', category:'奶茶咖啡', tags:['饮品'], thumb:'https://picsum.photos/seed/boba1/400/400', free:true },
  { id:3, title:'威士忌酒瓶', category:'酒水饮料', tags:['酒水'], thumb:'https://picsum.photos/seed/whisky/400/400', free:true },
  { id:4, title:'赛博独角兽', category:'动物', tags:['3D'], thumb:'https://picsum.photos/seed/uni/400/400', free:true },
  { id:5, title:'霓虹樱花树', category:'植物', tags:['植物'], thumb:'https://picsum.photos/seed/sakura/400/400', free:true },
  { id:6, title:'春节灯笼', category:'节日', tags:['节日'], thumb:'https://picsum.photos/seed/lantern/400/400', free:true },
];

const PAID_ASSETS = [
  { id:101, title:'动态 LOGO 包 × 12', category:'LOGO', tags:['套装'], thumb:'https://picsum.photos/seed/logopk/400/400', price:49 },
  { id:102, title:'咖啡香气动效', category:'奶茶咖啡', tags:['动效'], thumb:'https://picsum.photos/seed/coffee3d/400/400', price:29 },
  { id:103, title:'威士忌旋涡', category:'酒水饮料', tags:['全息'], thumb:'https://picsum.photos/seed/whirlw/400/400', price:39 },
  { id:104, title:'元气森林气泡', category:'酒水饮料', tags:['动效'], thumb:'https://picsum.photos/seed/bubble/400/400', price:29 },
  { id:105, title:'超级跑车展示', category:'汽车', tags:['3D'], thumb:'https://picsum.photos/seed/car3d/400/400', price:59 },
  { id:106, title:'太空人漫游', category:'科幻', tags:['科幻'], thumb:'https://picsum.photos/seed/astro/400/400', price:49 },
];

// ─── helpers ──────────────────────────────────────────────────────────────────
function compressImage(file, callback) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      const MAX = 1024;
      let { width, height } = img;
      if (width > MAX || height > MAX) {
        if (width > height) { height = Math.round(height * MAX / width); width = MAX; }
        else { width = Math.round(width * MAX / height); height = MAX; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      callback(canvas.toDataURL('image/jpeg', 0.75));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ─── PurchaseModal ─────────────────────────────────────────────────────────────
function PurchaseModal({ asset, onClose }) {
  const [tier, setTier] = useState('personal');
  const TIERS = [
    { id:'personal', label:'个人授权', price:'¥9.9', desc:'仅限个人非商业使用' },
    { id:'business', label:'企业授权', price:'¥24.9', desc:'商业用途，单品牌授权' },
    { id:'unlimited', label:'无限制授权', price:'¥99', desc:'多品牌 / 买断授权' },
  ];
  return h('div', { className:'modal-backdrop', onClick: onClose },
    h('div', {
      className:'glass',
      style:{ borderRadius:20, padding:'32px', maxWidth:420, width:'90%', position:'relative' },
      onClick: e => e.stopPropagation()
    },
      h('button', { onClick:onClose, style:{ position:'absolute', top:16, right:20, background:'none', border:'none', color:'rgba(255,255,255,0.4)', fontSize:22, cursor:'pointer' } }, '✕'),
      h('h3', { className:'orbitron', style:{ fontSize:18, fontWeight:900, marginBottom:6 } }, '购买授权'),
      h('p', { style:{ fontSize:13, color:'rgba(255,255,255,0.45)', marginBottom:24 } }, asset.title),
      h('div', { style:{ display:'flex', flexDirection:'column', gap:10, marginBottom:24 } },
        TIERS.map(t =>
          h('div', {
            key: t.id,
            onClick: () => setTier(t.id),
            style:{
              padding:'14px 16px', borderRadius:12, cursor:'pointer', transition:'all 0.2s',
              border: tier===t.id ? '1.5px solid #7c3aed' : '1px solid rgba(255,255,255,0.08)',
              background: tier===t.id ? 'rgba(124,58,237,0.15)' : 'rgba(255,255,255,0.03)',
              display:'flex', justifyContent:'space-between', alignItems:'center'
            }
          },
            h('div', null,
              h('div', { style:{ fontWeight:700, fontSize:14 } }, t.label),
              h('div', { style:{ fontSize:12, color:'rgba(255,255,255,0.4)', marginTop:2 } }, t.desc)
            ),
            h('div', { style:{ fontWeight:900, fontSize:18, color: tier===t.id ? '#a78bfa' : '#e2e8f0' } }, t.price)
          )
        )
      ),
      h('button', { className:'btn-primary', style:{ width:'100%', textAlign:'center' } }, '立即购买')
    )
  );
}

// ─── AssetGrid ─────────────────────────────────────────────────────────────────
function AssetGrid({ assets, paid }) {
  const [cat, setCat] = useState('全部');
  const [selected, setSelected] = useState(null);
  const filtered = cat === '全部' ? assets : assets.filter(a => a.category === cat);
  return h('div', null,
    /* categories */
    h('div', { style:{ display:'flex', gap:8, overflowX:'auto', paddingBottom:8, marginBottom:24 }, className:'no-scrollbar' },
      CATEGORIES.map(c =>
        h('button', { key:c, className:`cat-pill${cat===c?' active':''}`, onClick:()=>setCat(c) }, c)
      )
    ),
    /* grid */
    h('div', { style:{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))', gap:16 } },
      filtered.map(asset =>
        h('div', { key:asset.id, className:'asset-card glass', onClick:()=>setSelected(asset) },
          h('img', { src:asset.thumb, alt:asset.title, style:{ width:'100%', aspectRatio:'1/1', objectFit:'cover', display:'block' } }),
          h('div', { className:'card-overlay' },
            h('div', null,
              h('div', { style:{ fontSize:12, fontWeight:700, color:'#fff' } }, asset.title),
              paid
                ? h('div', { style:{ fontSize:11, color:'#a78bfa', marginTop:2 } }, `¥${asset.price}`)
                : h('div', { style:{ fontSize:11, color:'#4ade80', marginTop:2 } }, '免费')
            )
          ),
          h('div', { style:{ padding:'10px 12px' } },
            h('div', { style:{ fontSize:13, fontWeight:700, color:'#e2e8f0' } }, asset.title),
            h('div', { style:{ display:'flex', gap:4, marginTop:6, flexWrap:'wrap' } },
              asset.tags.map(t => h('span', { key:t, style:{ fontSize:10, padding:'2px 8px', borderRadius:9999, background:'rgba(255,255,255,0.07)', color:'rgba(255,255,255,0.5)' } }, t))
            )
          )
        )
      )
    ),
    selected && h(PurchaseModal, { asset:selected, onClose:()=>setSelected(null) })
  );
}

// ─── AI Tab ────────────────────────────────────────────────────────────────────
function AITab() {
  const [mode, setMode] = useState('text'); // 'text' | 'image'
  const [prompt, setPrompt] = useState('');
  const [imageFile, setImageFile] = useState(null);
  const [imagePreview, setImagePreview] = useState(null);
  const [size, setSize] = useState('1:1');
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const [progress, setProgress] = useState(0);
  const [error, setError] = useState('');
  const [taskId, setTaskId] = useState(null);
  const pollRef = useRef(null);
  const fileRef = useRef(null);

  const stopPoll = () => { if (pollRef.current) { clearInterval(pollRef.current); pollRef.current = null; } };

  useEffect(() => () => stopPoll(), []);

  function handleFile(file) {
    if (!file) return;
    setImageFile(file);
    compressImage(file, (b64) => setImagePreview(b64));
  }

  async function handleGenerate() {
    if (mode === 'text' && !prompt.trim()) { setError('请输入生成描述'); return; }
    if (mode === 'image' && !imagePreview) { setError('请上传参考图片'); return; }
    setError(''); setResult(null); setLoading(true); setProgress(10);

    try {
      if (mode === 'text') {
        const resp = await fetch('/api/generate', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ prompt, size })
        });
        const data = await resp.json();
        if (!resp.ok) { setError(data.error || '生成失败'); setLoading(false); return; }
        setProgress(100); setResult({ type:'image', url:data.url }); setLoading(false);
      } else {
        // I2V mode
        const resp = await fetch('/api/generate-video', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ imageBase64: imagePreview, prompt: prompt || '' })
        });
        const data = await resp.json();
        if (!resp.ok) { setError(data.error || '任务创建失败'); setLoading(false); return; }
        const tid = data.taskId;
        setTaskId(tid); setProgress(30);
        pollRef.current = setInterval(async () => {
          try {
            const pr = await fetch(`/api/task-status?taskId=${encodeURIComponent(tid)}`);
            const pd = await pr.json();
            if (pd.status === 'succeeded') {
              stopPoll(); setProgress(100);
              setResult({ type:'video', url:pd.videoUrl }); setLoading(false);
            } else if (pd.status === 'failed') {
              stopPoll(); setError(pd.error || '视频生成失败'); setLoading(false);
            } else {
              setProgress(p => Math.min(p + 8, 88));
            }
          } catch(e) { stopPoll(); setError('轮询失败: ' + e.message); setLoading(false); }
        }, 3000);
      }
    } catch(e) { setError('网络错误: ' + e.message); setLoading(false); }
  }

  const SIZES = [['1:1','方形'],['16:9','横版'],['9:16','竖版']];

  return h('div', { style:{ position:'relative', minHeight:500 } },
    /* orb */
    h('div', { style:{ position:'absolute', top:-80, left:'50%', transform:'translateX(-50%)', zIndex:0 } },
      h('div', { className:'orb' })
    ),
    h('div', { style:{ position:'relative', zIndex:1 } },
      /* mode selector */
      h('div', { style:{ display:'flex', gap:8, marginBottom:28, justifyContent:'center' } },
        ['text','image'].map(m =>
          h('button', { key:m, className:`nav-pill${mode===m?' active':''}`, onClick:()=>setMode(m) },
            m==='text' ? '🎨 关键词生图' : '🎬 图转视频'
          )
        )
      ),

      /* input area */
      h('div', { className:'glass', style:{ borderRadius:20, padding:28, maxWidth:680, margin:'0 auto' } },
        mode==='image' && h('div', { style:{ marginBottom:16 } },
          h('div', { style:{ border:'2px dashed rgba(255,255,255,0.1)', borderRadius:14, padding:24, textAlign:'center', cursor:'pointer', transition:'border-color 0.2s' },
            onClick:()=>fileRef.current?.click(),
            onDragOver:e=>{e.preventDefault();},
            onDrop:e=>{e.preventDefault(); handleFile(e.dataTransfer.files[0]);}
          },
            imagePreview
              ? h('img', { src:imagePreview, style:{ maxHeight:200, borderRadius:10, display:'block', margin:'0 auto' } })
              : h('div', { style:{ color:'rgba(255,255,255,0.35)' } },
                  h('div', { style:{ fontSize:32 } }, '📁'),
                  h('div', { style:{ marginTop:8, fontSize:13 } }, '点击或拖拽上传图片')
                )
          ),
          h('input', { type:'file', accept:'image/*', ref:fileRef, style:{display:'none'}, onChange:e=>handleFile(e.target.files[0]) })
        ),

        h('textarea', {
          value:prompt, onChange:e=>setPrompt(e.target.value),
          placeholder: mode==='text' ? '描述你想要的全息画面，例如：赛博朋克龙，紫色霓虹，3D旋转...' : '可选：补充动效描述，例如：缓慢旋转，呼吸感光晕...',
          rows:4, style:{ resize:'none', marginBottom:16 }
        }),

        /* size pills (text mode only) */
        mode==='text' && h('div', { style:{ display:'flex', gap:8, marginBottom:20 } },
          SIZES.map(([k,label]) =>
            h('button', { key:k, className:`param-pill${size===k?' selected':''}`, onClick:()=>setSize(k) }, label)
          )
        ),

        error && h('div', { style:{ color:'#f87171', fontSize:13, marginBottom:12, padding:'8px 12px', background:'rgba(248,113,113,0.1)', borderRadius:8 } }, error),

        loading && h('div', { style:{ marginBottom:16 } },
          h('div', { className:'progress-bar' },
            h('div', { className:'progress-fill', style:{ width: progress+'%' } })
          ),
          h('div', { style:{ textAlign:'center', fontSize:12, color:'rgba(255,255,255,0.4)', marginTop:6 } },
            mode==='text' ? '正在生成...' : `生成中 ${progress}%`
          )
        ),

        h('div', { style:{ textAlign:'center' } },
          h('button', { className:'btn-primary', disabled:loading, onClick:handleGenerate },
            loading ? '生成中...' : (mode==='text' ? '✨ 生成图片' : '🎬 生成视频')
          )
        )
      ),

      /* result */
      result && h('div', { style:{ marginTop:28, textAlign:'center' } },
        result.type==='image'
          ? h('img', { src:result.url, style:{ maxWidth:480, width:'100%', borderRadius:16, boxShadow:'0 0 60px rgba(139,92,246,0.3)' } })
          : h('video', { src:result.url, controls:true, autoPlay:true, loop:true, style:{ maxWidth:480, width:'100%', borderRadius:16 } }),
        h('div', { style:{ marginTop:16, display:'flex', gap:12, justifyContent:'center' } },
          h('a', { href:result.url, download:'hologram', className:'btn-primary', style:{ textDecoration:'none' } }, '⬇ 下载'),
          h('button', { className:'btn-secondary', onClick:()=>setResult(null) }, '重新生成')
        )
      )
    )
  );
}

// ─── CustomOrder Tab ───────────────────────────────────────────────────────────
function CustomOrderTab() {
  const [form, setForm] = useState({ companyName:'', industry:'', name:'', position:'', phone:'', email:'', description:'' });
  const [loading, setLoading] = useState(false);
  const [done, setDone] = useState(false);
  const [error, setError] = useState('');
  const up = (k) => (e) => setForm(f => ({ ...f, [k]: e.target.value }));

  async function handleSubmit(e) {
    e.preventDefault();
    if (!form.name.trim() || !form.phone.trim() || !form.description.trim()) {
      setError('姓名、联系电话、需求描述为必填项'); return;
    }
    setError(''); setLoading(true);
    try {
      const resp = await fetch('/api/custom-order', {
        method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(form)
      });
      const data = await resp.json();
      if (!resp.ok) { setError(data.error || '提交失败'); setLoading(false); return; }
      setDone(true);
    } catch(e) { setError('网络错误: ' + e.message); }
    setLoading(false);
  }

  if (done) return h('div', { style:{ textAlign:'center', padding:'80px 20px' } },
    h('div', { style:{ fontSize:64, marginBottom:16 } }, '✅'),
    h('h3', { className:'orbitron', style:{ fontSize:22, fontWeight:900, marginBottom:8 } }, '申请已提交！'),
    h('p', { style:{ color:'rgba(255,255,255,0.5)' } }, '我们将在 24 小时内与您联系'),
    h('button', { className:'btn-secondary', style:{ marginTop:24 }, onClick:()=>{ setDone(false); setForm({ companyName:'', industry:'', name:'', position:'', phone:'', email:'', description:'' }); } }, '再次提交')
  );

  return h('div', { style:{ maxWidth:600, margin:'0 auto' } },
    h('h2', { className:'orbitron', style:{ fontSize:22, fontWeight:900, marginBottom:6 } }, '内容定制委托'),
    h('p', { style:{ color:'rgba(255,255,255,0.45)', fontSize:14, marginBottom:32 } }, '告诉我们你的需求，专属全息内容 24 小时内响应'),

    h('form', { onSubmit: handleSubmit },
      /* 公司信息 */
      h('div', { className:'glass', style:{ borderRadius:16, padding:24, marginBottom:16 } },
        h('div', { className:'section-label' }, '公司信息'),
        h('div', { style:{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 } },
          h('input', { placeholder:'公司名称', value:form.companyName, onChange:up('companyName') }),
          h('input', { placeholder:'所属行业', value:form.industry, onChange:up('industry') })
        )
      ),

      /* 申请人信息 */
      h('div', { className:'glass', style:{ borderRadius:16, padding:24, marginBottom:16 } },
        h('div', { className:'section-label' }, '申请人信息'),
        h('div', { style:{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginBottom:12 } },
          h('input', { placeholder:'姓名 *', value:form.name, onChange:up('name') }),
          h('input', { placeholder:'职位', value:form.position, onChange:up('position') })
        ),
        h('div', { style:{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 } },
          h('input', { placeholder:'联系电话 *', value:form.phone, onChange:up('phone') }),
          h('input', { placeholder:'邮箱', type:'email', value:form.email, onChange:up('email') })
        )
      ),

      /* 定制需求 */
      h('div', { className:'glass', style:{ borderRadius:16, padding:24, marginBottom:24 } },
        h('div', { className:'section-label' }, '定制需求'),
        h('textarea', { placeholder:'请详细描述定制需求，例如：品牌 LOGO 全息动效、产品展示视频、活动节日素材等... *', rows:5, style:{ resize:'none' }, value:form.description, onChange:up('description') })
      ),

      error && h('div', { style:{ color:'#f87171', fontSize:13, marginBottom:16, padding:'10px 14px', background:'rgba(248,113,113,0.08)', borderRadius:8 } }, error),

      h('button', { type:'submit', className:'btn-primary', disabled:loading, style:{ width:'100%', padding:'14px' } },
        loading ? '提交中...' : '提交定制申请'
      )
    )
  );
}

// ─── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState('home');
  const TABS = [
    { id:'home', label:'HOME' },
    { id:'free', label:'免费素材' },
    { id:'paid', label:'付费素材' },
    { id:'ai', label:'AI 生成' },
    { id:'order', label:'内容定制' },
    { id:'profile', label:'个人中心' },
  ];

  const renderTab = () => {
    switch(tab) {
      case 'home': return h(HomeTab, { setTab });
      case 'free': return h(AssetGrid, { assets:FREE_ASSETS, paid:false });
      case 'paid': return h(AssetGrid, { assets:PAID_ASSETS, paid:true });
      case 'ai':   return h(AITab);
      case 'order':return h(CustomOrderTab);
      case 'profile':return h(ProfileTab);
      default: return null;
    }
  };

  return h('div', { style:{ minHeight:'100vh', position:'relative' } },
    h('div', { className:'grid-bg' }),
    h('div', { style:{ position:'relative', zIndex:1, maxWidth:1100, margin:'0 auto', padding:'0 20px' } },
      /* header */
      h('header', { style:{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'20px 0 16px', borderBottom:'1px solid rgba(255,255,255,0.06)', marginBottom:28 } },
        h('div', { className:'orbitron', style:{ fontWeight:900, fontSize:18, letterSpacing:'0.05em' } },
          h('span', { style:{ background:'linear-gradient(135deg,#7c3aed,#a78bfa)', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent' } }, 'WEILÜ'),
          h('span', { style:{ color:'rgba(255,255,255,0.3)', fontWeight:400, fontSize:12, marginLeft:8 } }, '全息内容')
        ),
        /* nav */
        h('nav', { style:{ display:'flex', gap:6, overflowX:'auto' }, className:'no-scrollbar' },
          TABS.map(t =>
            h('button', { key:t.id, className:`nav-pill${tab===t.id?' active':''}`, onClick:()=>setTab(t.id) }, t.label)
          )
        )
      ),
      /* content */
      h('main', { style:{ paddingBottom:60 } }, renderTab())
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
