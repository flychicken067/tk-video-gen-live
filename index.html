function CheckoutView({ item }) {
  return h('div', { className:'checkout-container animate-fade' },
    h('div', { className:'checkout-main' }, h('div', { style:{ fontWeight:800, marginBottom:30 } }, '订单内容：1件'), h('div', { style:{ display:'flex', gap:20, alignItems:'center', padding:'20px 0', borderTop:'1px solid #eee' } }, h('img', { src:item.thumb, style:{ width:100, borderRadius:8 } }), h('div', { style:{ flex:1 } }, h('div', { style:{ fontWeight:800 } }, item.title), h('div', { style:{ fontSize:12, color:'#94a3b8' } }, '类型: 视频素材')), h('div', { style:{ fontWeight:900 } }, `¥ ${item.price}`))),

  const handleGen = async () => {

    setLoading(true); setStatus('任务提交中...');
    try {
      const resp = await fetch(`${API_BASE}/generate-video`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ imageBase64: imgBase64, rotation: 'horizontal', background: 'pure_black' }) });

      const poll = setInterval(async () => {
        const r = await fetch(`${API_BASE}/task-status?taskId=${encodeURIComponent(data.taskId)}`);
        const d = await r.json();
        if (d.status==='succeeded') { clearInterval(poll); setResult({url:d.videoUrl}); setLoading(false); }

    )
  );
}

  const [selected, setSelected] = useState(null);
